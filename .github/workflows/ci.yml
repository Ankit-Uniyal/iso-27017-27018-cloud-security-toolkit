name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.9", "3.11", "3.12" ]
    defaults:
      run:
        working-directory: 13-SCRIPTS
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax-check all scripts (compile)
        run: python -m py_compile cloud_soa_tracker.py cloud_gap_checker.py dpia_cloud_scorer.py

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Smoke-test gap checker
        run: python cloud_gap_checker.py --input samples/gap_assessment.csv --output gap_report.md || echo "Critical gaps detected (expected for sample data)"

      - name: Smoke-test SoA tracker
        run: python cloud_soa_tracker.py --input samples/soa.csv --output soa_status.md

      - name: Smoke-test DPIA scorer
        run: python dpia_cloud_scorer.py --input samples/dpia.yaml --output dpia_score.md || true
